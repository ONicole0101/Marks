  <style>
    * {

    body {

      margin: 0;
    }

    .container {
      width: 100%;
      margin: 0;
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.25;
    }

    .card {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: clamp(8px, 1vw, 15px);
      overflow: hidden;
    }

    .table-scroll {
      overflow: auto;
      max-height: min(70vh, 700px);
      position: relative;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: clamp(11px, 1vw, 13px);
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1c2330;
      z-index: 200;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 2px 0 #30363d;
    }

    thead th:hover {
      background: #263041;
    }

    tbody td {
      background: #161b22;
      position: relative;
      z-index: 1;
    }

    tbody td:first-child {
      position: sticky;
      left: 0;
      background: #161b22;
      z-index: 150;
    }

    thead th:first-child {
      position: sticky;
      top: 0;
      left: 0;
      background: #1c2330;
      z-index: 250;
    }

    th,
    td {
      padding: clamp(6px, 0.8vw, 10px);
      border-bottom: 1px solid #30363d;
      border-right: 1px solid #30363d;
      white-space: nowrap;
      vertical-align: middle;
    }

    thead th,
    tbody td:first-child {
      background-clip: padding-box;
    }

    .table-lv1 {
      font-size: clamp(11px, 1vw, 13px);
      line-height: 1.25;
    }

    .table-lv2 {
      font-size: clamp(10px, 0.9vw, 11px);
      line-height: 1.2;
      color: #8b949e;
    }

    .table-lv3 {
      font-size: clamp(9px, 0.85vw, 10px);
      line-height: 1.2;
      color: #8b949e;
    }


    .up {
      color: #f85149;
    }

    .dn {
      color: #3fb950;
    }

    .sig {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.4;
    }

    .sig.up {
      background: #3fb95022;
      color: #3fb950;
    }

    .sig.dn {
      background: #f8514922;
      color: #f85149;
    }

    .sig.watch {
      background: #d2992222;
      color: #d29922;
    }

    .signal-cell {
      min-width: 160px;
      white-space: normal;
      line-height: 1.4;
    }

    .signal-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .signal-sub {
      font-size: 11px;
      color: #8b949e;
      word-break: break-word;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .box {
      padding: clamp(8px, 1.5vw, 12px);
      border-radius: 8px;
      text-align: center;
      min-width: 0;
      font-size: clamp(12px, 1vw, 14px);
    }

    .buy {
      background: #3fb95022;
    }

    .sell {
      background: #f8514922;
    }

    .watch {
      background: #d2992222;
    }

    .hold {
      background: #8b949e22;
    }

    .metric {
      text-align: center;
      line-height: 1.2;
    }

    .metric-main {
      font-size: clamp(11px, 1vw, 12px);
      font-weight: normal;
    }

    .metric-sub {
      font-size: clamp(10px, 0.9vw, 11px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .metric-2line {
      line-height: 1.4;
    }

    .metric-note {
      display: block;
      margin-top: 2px;
      font-size: 10px;
      color: #8b949e;
      white-space: normal;
    }

    .text-red {
      color: #ff4d4f;
    }

    .text-green {
      color: #00b050;
    }

    .mobile-list {
      display: none;
    }

    .stock-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .stock-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .stock-title {
      font-size: 15px;
      font-weight: bold;
    }

    .stock-price {
      font-size: 18px;
      font-weight: bold;
    }

    .stock-change {
      font-size: 13px;
    }

    .stock-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
      font-size: 12px;
    }

    .stock-item {
      min-width: 0;
    }

    .stock-label {
      color: #8b949e;
      font-size: 11px;
      margin-bottom: 2px;
    }

    .stock-value {
      word-break: break-word;
    }

    .stock-signal {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #30363d;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 1024px) {
      .container {
        padding: 12px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      th,
      td {
        padding: 6px;
        font-size: 11px;
      }

      .col-lg {
        display: none;
      }

      .table-scroll {
        max-height: 65vh;
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 8px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .card {
        padding: 0;
        border: none;
        background: transparent;
        overflow: visible;
      }

      .table-scroll {
        display: none;
      }

      .mobile-list {
        display: block;
      }
    }
  </style>
</head>

        return currentSortDirection === "asc" ? result : -result;
      });

      renderTable(sortedStocks);
      renderMobileCards(sortedStocks);
      updateSortIndicators();
    }

    function updateSortIndicators() {
      document.querySelectorAll("thead th").forEach((th) => {
        const key = th.dataset.key;
        if (!key) return;

        if (!th.dataset.label) {
          th.dataset.label = th.innerHTML.replace(/\s*[▲▼]$/, "");
        }

        th.innerHTML = key === currentSortKey
          ? `${th.dataset.label} ${currentSortDirection === "asc" ? "▲" : "▼"}`
          : th.dataset.label;
      });
    }

    function bindSorting() {
      document.querySelectorAll("thead th[data-key]").forEach((th) => {
        th.addEventListener("click", () => {
          sortStocks(th.dataset.key);
        });
      });
    }


    const buy = sortedStocks.filter(s => s?.signal === "買進").length;
    const sell = sortedStocks.filter(s => s?.signal === "賣出").length;
    const watch = sortedStocks.filter(s => s?.signal === "等待觀察").length;
    const hold = sortedStocks.filter(
      s => s?.signal === "觀察再買進" || s?.signal === "觀察再賣出").length;




    renderTable(sortedStocks);
    renderMobileCards(sortedStocks);
    bindSorting();

    document.getElementById("buyCount").innerText = buy;
    document.getElementById("sellCount").innerText = sell;
    document.getElementById("watchCount").innerText = watch;
    document.getElementById("holdCount").innerText = hold;
  </script>

</body>

</html>
