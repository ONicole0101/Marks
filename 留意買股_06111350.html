      return v === null || v === undefined || (typeof v === "number" && Number.isNaN(v));
    }

    function fmt(v, suffix = "") {
      if (v === null || v === undefined || v === "" || Number.isNaN(v)) return "-";
      const num = Number(v);
      if (num === 0) return "0" + suffix;
      const isInteger = Number.isInteger(num);
      const formatted = isInteger
        ? num.toLocaleString("en-US")
        : num.toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      return formatted + suffix;
    }

    function fmtTrend(v) {
      if (v >= 1) return "↑↑";
      if (v > 0) return "↑";
      if (v <= -1) return "↓↓";
      if (v < 0) return "↓";
      return "→";
    }

    function trendClass(v) {
      if (v >= 1) return "up strong";
      if (v > 0) return "up";
      if (v <= -1) return "dn strong";
      if (v < 0) return "dn";
      return "";
    }

    function renderMetric3(value, m, q, y, suffix = "") {
      const renderLine = (label, v) => {
        if (isNil(v)) {
          return `<div>${label} -</div>`;
        }
        return `
      <div class="${trendClass(v)}">
        ${label} ${fmtTrend(v)} ${fmt(v, "%")}
      </div>
    `;
      };
      return `
  <div class="metric">
    <div class="table-lv1">${fmt(value, suffix)}</div>
    <div class="metric-sub">
      ${renderLine("M", m)}
      ${renderLine("Q", q)}
      ${renderLine("Y", y)}
    </div>
  </div>`;
    }

    function renderRangeMetric(current, low, high, suffix = "", cls = "") {
      return `
      <div class="metric metric-2line">
        <div class="table-lv1 ${cls}">${fmt(current, suffix)}</div>
        <div class="table-lv2">${fmt(low, suffix)}</div>
        <div class="table-lv2">${fmt(high, suffix)}</div>
      </div>`;
    }

    function supportResistanceTooltip(type) {
      if (type === "resistance") {
        return "壓力點距離%＝(壓力點價格 - 目前收盤價) ÷ 目前收盤價 × 100。數值越小代表越接近上方壓力。";
      }
      return "支撐點距離%＝(目前收盤價 - 支撐點價格) ÷ 目前收盤價 × 100。數值越小代表越接近下方支撐。";
    }

    function renderChangePctBlock(s) {
      return `
        <div class="table-lv1 ${chgClass(s)}">${chgSign(s)}${fmt(s.chgPct, "%")}</div>
        <div class="table-lv2">震幅 ${fmt(s.amp, "%")}</div>
        <div class="table-lv2">${fmt(s.price_min)}</div>
        <div class="table-lv2">${fmt(s.price_max)}</div>`;
    }

    function distClass(val) {
      if (isNil(val)) return "";
      if (Number(val) > 0) return "up";
      if (Number(val) < 0) return "dn";
      return "";
    }

    function fmtMonthDay(dateText) {
      if (isNil(dateText) || dateText === "") return "";
      const parts = String(dateText).slice(0, 10).split("-");
      if (parts.length >= 3) return `${parts[1]}/${parts[2]}`;
      return String(dateText);
    }


    function chipDateMMDD(dateText, fallback = "") {
      const value = fmtMonthDay(dateText);
      return value ? value.replace("/", "") : fallback;
    }

    function chipValueClass(current, previous) {
      if (isNil(current) || isNil(previous)) return "";
      const cur = Number(current);
      const prev = Number(previous);
      if (!Number.isFinite(cur) || !Number.isFinite(prev)) return "";
      if (cur > prev) return "up";
      if (cur < prev) return "dn";
      return "";
    }

    function pickFirst(...values) {
      for (const value of values) {
        if (!isNil(value) && value !== "") return value;
      }
      return null;
    }

    function chipLine(dateText, value, previousValue, suffix = "", unit = "", small = false, fallbackLabel = "") {
      const cls = small ? "chip-line-small" : "chip-line";
      const colorCls = previousValue === undefined ? "" : chipValueClass(value, previousValue);
      const label = chipDateMMDD(dateText, fallbackLabel);
      const displayValue = isNil(value) ? "-" : `${fmt(value, suffix)}${unit}`;
      return `<div class="${cls} ${colorCls}">${label ? `${label}：` : ""}${displayValue}</div>`;
    }

    function dayLabel(idx) {
      if (idx === 0) return "T";
      if (idx === 1) return "T-1";
      if (idx === 2) return "T-2";
      return "";
    }

    function dayDateMMDD(s, idx, prefix = "date") {
      const value = pickFirst(
        s[`${prefix}_date_t${idx}`],
        s[`date_t${idx}`],
        s[`price_date_t${idx}`],
        s[`kd_date_t${idx}`],
        s[`chip_date_t${idx}`],
        s[`date${idx}`]
      );
      return chipDateMMDD(value, dayLabel(idx));
    }

    function kdValue(s, idx) {
      if (idx === 0) return pickFirst(s.k_t0, s.kd_k_t0, s.k);
      if (idx === 1) return pickFirst(s.k_t1, s.kd_k_t1, s.prev_k, s.k_prev, s.k_t_1, s.K_t1, s.k1);
      if (idx === 2) return pickFirst(s.k_t2, s.kd_k_t2, s.prev2_k, s.k_prev2, s.k_t_2, s.K_t2, s.k2);
      if (idx === 3) return pickFirst(s.k_t3, s.kd_k_t3, s.prev3_k, s.k_prev3, s.k_t_3, s.K_t3, s.k3);
      return null;
    }

    function kdLine(s, idx, value, previousValue) {
      if (isNil(value)) return "";
      const label = dayDateMMDD(s, idx, "kd");
      const colorCls = previousValue === undefined ? "" : chipValueClass(value, previousValue);
      return `<div class="table-lv2 ${colorCls}">${label ? `${label}：` : ""}K ${fmt(value)}</div>`;
    }

    function kdDayScore(s) {
      const k0 = kdValue(s, 0);
      const k1 = kdValue(s, 1);
      if (isNil(k0) || isNil(k1)) return 0;
      const cur = Number(k0);
      const prev = Number(k1);
      if (!Number.isFinite(cur) || !Number.isFinite(prev)) return 0;
      if (cur > prev) return 0.5;
      if (cur < prev) return -0.5;
      return 0;
    }

    function renderKDCell(s) {
      const k0 = kdValue(s, 0);
      const k1 = kdValue(s, 1);
      const k2 = kdValue(s, 2);
      const k3 = kdValue(s, 3);
      const score = kdDayScore(s);
      const k0Class = isNil(k1) ? "" : chipValueClass(k0, k1);
      return `
        <td>
          <div class="table-lv1 ${trendClass(score)}">${fmtTrend(score)}</div>
          <div class="table-lv2 ${k0Class}">K ${fmt(k0)}</div>
          <div class="table-lv2">D ${fmt(s.d)}</div>
          ${kdLine(s, 1, k1, k2)}
          ${kdLine(s, 2, k2, k3)}
        </td>`;
    }

    function renderKDBlock(s) {
      const k0 = kdValue(s, 0);
      const k1 = kdValue(s, 1);
      const k2 = kdValue(s, 2);
      const k3 = kdValue(s, 3);
      const score = kdDayScore(s);
      const k0Class = isNil(k1) ? "" : chipValueClass(k0, k1);
      return `<div class="stock-value">
        <div class="table-lv1 ${trendClass(score)}">${fmtTrend(score)}</div>
        <div class="table-lv2 ${k0Class}">K ${fmt(k0)} / D ${fmt(s.d)}</div>
        ${kdLine(s, 1, k1, k2)}
        ${kdLine(s, 2, k2, k3)}
      </div>`;
    }

    function priceLHValue(s, idx, kind) {
      const field = kind === "low" ? "min" : "max";
      const legacy = kind === "low" ? "low" : "high";
      if (idx === 0) {
        return pickFirst(s[`price_${field}_t0`], s[`price_${legacy}_t0`], kind === "low" ? s.price_min : s.price_max);
      }
      if (idx === 1) {
        return pickFirst(s[`price_${field}_t1`], s[`price_${legacy}_t1`], s[`prev_price_${field}`], s[`prev_${legacy}`]);
      }
      if (idx === 2) {
        return pickFirst(s[`price_${field}_t2`], s[`price_${legacy}_t2`], s[`prev2_price_${field}`], s[`prev2_${legacy}`]);
      }
      if (idx === 3) {
        return pickFirst(s[`price_${field}_t3`], s[`price_${legacy}_t3`], s[`prev3_price_${field}`], s[`prev3_${legacy}`]);
      }
      return null;
    }

    function priceLHTrendScore(s) {
      const low0 = priceLHValue(s, 0, "low");
      const high0 = priceLHValue(s, 0, "high");
      const low1 = priceLHValue(s, 1, "low");
      const high1 = priceLHValue(s, 1, "high");
      const low2 = priceLHValue(s, 2, "low");
      const high2 = priceLHValue(s, 2, "high");
      if ([low0, high0, low1, high1, low2, high2].some(isNil)) return null;
      const higherHighs = Number(high0) > Number(high1) && Number(high1) > Number(high2);
      const higherLows = Number(low0) > Number(low1) && Number(low1) > Number(low2);
      const lowerHighs = Number(high0) < Number(high1) && Number(high1) < Number(high2);
      const lowerLows = Number(low0) < Number(low1) && Number(low1) < Number(low2);
      if (higherHighs && higherLows) return 1;
      if (lowerHighs && lowerLows) return -1;
      return 0;
    }

    function priceLHTrendLabel(score) {
      if (isNil(score)) return "-";
      if (score > 0) return "高高";
      if (score < 0) return "低低";
      return "盤整";
    }

    function renderPriceLHLine(s, idx, previousIdx) {
      const low = priceLHValue(s, idx, "low");
      const high = priceLHValue(s, idx, "high");
      const previousLow = previousIdx === undefined ? undefined : priceLHValue(s, previousIdx, "low");
      const previousHigh = previousIdx === undefined ? undefined : priceLHValue(s, previousIdx, "high");
      const lowCls = previousIdx === undefined ? "" : chipValueClass(low, previousLow);
      const highCls = previousIdx === undefined ? "" : chipValueClass(high, previousHigh);
      const label = dayDateMMDD(s, idx, "price");
      return `
        <div class="table-lv2 price-lh-line">
          <span class="price-lh-date">${escapeHtml(label)}：</span>
          <span class="${lowCls}">低 ${fmt(low)}</span>
          <span class="${highCls}">高 ${fmt(high)}</span>
        </div>`;
    }

    function renderPriceLHTrendCell(s) {
      const score = priceLHTrendScore(s);
      return `
        <td>
          <div class="table-lv1 ${trendClass(score)}">${priceLHTrendLabel(score)}</div>
          ${renderPriceLHLine(s, 0, 1)}
          ${renderPriceLHLine(s, 1, 2)}
          ${renderPriceLHLine(s, 2, 3)}
        </td>`;
    }

    function renderPriceLHTrendBlock(s) {
      const score = priceLHTrendScore(s);
      return `<div class="stock-value">
        <div class="table-lv1 ${trendClass(score)}">${priceLHTrendLabel(score)}</div>
        ${renderPriceLHLine(s, 0, 1)}
        ${renderPriceLHLine(s, 1, 2)}
        ${renderPriceLHLine(s, 2, 3)}
      </div>`;
    }

    function renderChipConcentrationCell(s) {
      return `
        <td>
          <div class="chip-detail">
            <div class="chip-arrow ${trendClass(s.chip_concentration_score)}">${isNil(s.chip_concentration_score) ? "-" : fmtTrend(s.chip_concentration_score)}</div>
            ${chipLine(s.chip_date_t0 ?? s.chip_latest_date, pickFirst(s.chip_concentration_pct_t0, s.chip_concentration_pct), s.chip_concentration_pct_t1, "%", "", false, "今日")}
            ${chipLine(s.chip_date_t1, s.chip_concentration_pct_t1, s.chip_concentration_pct_t2, "%", "", true, "T-1")}
            ${chipLine(s.chip_date_t2, s.chip_concentration_pct_t2, undefined, "%", "", true, "T-2")}
          </div>
        </td>`;
    }

    function renderMainForceCell(s) {
      return `
        <td>
          <div class="chip-detail">
            <div class="chip-arrow ${trendClass(s.main_force_score)}">${isNil(s.main_force_score) ? "-" : fmtTrend(s.main_force_score)}</div>
            ${chipLine(s.chip_date_t0 ?? s.chip_latest_date, pickFirst(s.main_force_net_t0, s.main_force_net), s.main_force_net_t1, "", "張", false, "今日")}
            ${chipLine(s.chip_date_t1, s.main_force_net_t1, s.main_force_net_t2, "", "張", true, "T-1")}
            ${chipLine(s.chip_date_t2, s.main_force_net_t2, undefined, "", "張", true, "T-2")}
          </div>
        </td>`;
    }

    function renderBrokerDiffCell(s) {
      return `
        <td>
          <div class="chip-detail">
            <div class="chip-arrow ${trendClass(s.broker_diff_score)}">${isNil(s.broker_diff_score) ? "-" : fmtTrend(s.broker_diff_score)}</div>
            ${chipLine(s.chip_date_t0 ?? s.chip_latest_date, pickFirst(s.broker_diff_t0, s.broker_diff), s.broker_diff_t1, "", "家", false, "今日")}
            ${chipLine(s.chip_date_t1, s.broker_diff_t1, s.broker_diff_t2, "", "家", true, "T-1")}
            ${chipLine(s.chip_date_t2, s.broker_diff_t2, undefined, "", "家", true, "T-2")}
          </div>
        </td>`;
    }

    function renderChipConcentrationBlock(s) {
      return `<div class="stock-value">
        <div class="chip-arrow ${trendClass(s.chip_concentration_score)}">${isNil(s.chip_concentration_score) ? "-" : fmtTrend(s.chip_concentration_score)}</div>
        ${chipLine(s.chip_date_t0 ?? s.chip_latest_date, pickFirst(s.chip_concentration_pct_t0, s.chip_concentration_pct), s.chip_concentration_pct_t1, "%", "", false, "今日")}
        ${chipLine(s.chip_date_t1, s.chip_concentration_pct_t1, s.chip_concentration_pct_t2, "%", "", true, "T-1")}
        ${chipLine(s.chip_date_t2, s.chip_concentration_pct_t2, undefined, "%", "", true, "T-2")}
      </div>`;
    }

    function renderMainForceBlock(s) {
      return `<div class="stock-value">
        <div class="chip-arrow ${trendClass(s.main_force_score)}">${isNil(s.main_force_score) ? "-" : fmtTrend(s.main_force_score)}</div>
        ${chipLine(s.chip_date_t0 ?? s.chip_latest_date, pickFirst(s.main_force_net_t0, s.main_force_net), s.main_force_net_t1, "", "張", false, "今日")}
        ${chipLine(s.chip_date_t1, s.main_force_net_t1, s.main_force_net_t2, "", "張", true, "T-1")}
        ${chipLine(s.chip_date_t2, s.main_force_net_t2, undefined, "", "張", true, "T-2")}
      </div>`;
    }

    function renderBrokerDiffBlock(s) {
      return `<div class="stock-value">
        <div class="chip-arrow ${trendClass(s.broker_diff_score)}">${isNil(s.broker_diff_score) ? "-" : fmtTrend(s.broker_diff_score)}</div>
        ${chipLine(s.chip_date_t0 ?? s.chip_latest_date, pickFirst(s.broker_diff_t0, s.broker_diff), s.broker_diff_t1, "", "家", false, "今日")}
        ${chipLine(s.chip_date_t1, s.broker_diff_t1, s.broker_diff_t2, "", "家", true, "T-1")}
        ${chipLine(s.chip_date_t2, s.broker_diff_t2, undefined, "", "家", true, "T-2")}
      </div>`;
    }

    function dispositionPeriodHtml(s) {
      const start = fmtMonthDay(s.period_start ?? s.disposition_period_start);
      const end = fmtMonthDay(s.period_end ?? s.disposition_period_end);
      if (!start || !end) return "";
      return `<div> ${escapeHtml(start)}</div><div>${escapeHtml(end)}</div>`;
    }

    function shortName(name) {
      const text = String(name ?? "-");
      return Array.from(text).slice(0, 3).join("");
    }

    function chgClass(s) {
      return Number(s.chgPct ?? 0) >= 0 ? "up" : "dn";
    }

    function chgSign(s) {
      return Number(s.chgPct ?? 0) >= 0 ? "+" : "";
    }

    function renderCodeCell(s) {
      const dispositionHtml = dispositionPeriodHtml(s);
      return `
        <td>
          <div class="table-lv1">${s.code ?? ""}</div>
          <div class="table-lv2">${shortName(s.name)}</div>
          ${dispositionHtml ? `<div class="table-lv3 text-red disposition-period">${dispositionHtml}</div>` : ""}
        </td>`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function cleanSignalOutput(value) {
      let text = String(value ?? "");
      const k = (...parts) => parts.join("");
      const replacements = [
        [k("觀察", "再", "賣", "出"), "風險升高"],
        [k("觀察", "再", "買", "進"), "轉強追蹤"],
        [k("等待", "觀察"), "方向尚未明確"],
        [k("買", "進"), "轉強"],
        [k("賣", "出"), "調節"],
        [k("偏", "多"), "轉強"],
        [k("偏", "空"), "轉弱"],
        [k("中", "性"), "震盪"],
        [k("訊號", "尚未", "明確"), "方向尚未明確"]
      ];
      replacements.forEach(([oldText, newText]) => {
        text = text.split(oldText).join(newText);
      });
      return text.trim();
    }

    function renderSignalText(text) {
      const cleaned = cleanSignalOutput(text);
      if (!cleaned) return "";
      const sections = { tech: "", chip: "", other: "" };
      cleaned.split(/\n+/).forEach(line => {
        const item = line.trim();
        if (!item) return;
        if (item.startsWith("技術面：")) sections.tech = item.replace(/^技術面：/, "");
        else if (item.startsWith("技術：")) sections.tech = item.replace(/^技術：/, "");
        else if (item.startsWith("籌碼面：")) sections.chip = item.replace(/^籌碼面：/, "");
        else if (item.startsWith("籌碼：")) sections.chip = item.replace(/^籌碼：/, "");
        else sections.other += (sections.other ? " / " : "") + item;
      });
      const blocks = [];
      if (sections.tech) {
        blocks.push(`<div class="signal-section signal-section-tech"><span class="signal-section-title">技術：</span>${escapeHtml(sections.tech)}</div>`);
      }
      if (sections.chip) {
        blocks.push(`<div class="signal-section signal-section-chip"><span class="signal-section-title">籌碼：</span>${escapeHtml(sections.chip)}</div>`);
      }
      if (!sections.tech && !sections.chip && sections.other) {
        blocks.push(`<div class="signal-section">${escapeHtml(sections.other)}</div>`);
      }
      return `<div class="table-lv2 signal-text">${blocks.join("")}</div>`;
    }

    function renderSignalCell(s) {
      return `
        <td class="signal-cell">
          <div class="signal-wrap">
            ${renderSignalText(s.signal_text)}
            ${s.entry_note ? `<div class="table-lv2">${escapeHtml(cleanSignalOutput(s.entry_note))}</div>` : ""}
          </div>
        </td>`;
    }

    function renderCell(s, key) {
      switch (key) {
        case "code":
          return renderCodeCell(s);
        case "price":
          return `<td>${renderRangeMetric(s.price, s.price_60d_low, s.price_60d_high)}</td>`;
        case "price_lh_trend":
          return renderPriceLHTrendCell(s);
        case "resistance_price":
          return `<td class="sr-price-cell" title="${escapeHtml(supportResistanceTooltip("resistance"))}"><div class="table-lv1 text-red">${fmt(s.resistance_price)}</div><div class="table-lv2">${isNil(s.resistance_distance_pct) ? "-" : `+${fmt(s.resistance_distance_pct, "%")}`}</div></td>`;
        case "support_price":
          return `<td class="sr-price-cell" title="${escapeHtml(supportResistanceTooltip("support"))}"><div class="table-lv1 text-green">${fmt(s.support_price)}</div><div class="table-lv2">${isNil(s.support_distance_pct) ? "-" : `-${fmt(s.support_distance_pct, "%")}`}</div></td>`;
        case "chg":
          return `
            <td>
              <div class="table-lv1 ${chgClass(s)}">${chgSign(s)}${fmt(s.chg)}</div>
              <div class="table-lv2">${fmt(s.price_min)}</div>
              <div class="table-lv2">${fmt(s.price_max)}</div>
              <div class="table-lv3">(${(Number(s.price_max ?? 0) - Number(s.price_min ?? 0)).toFixed(2)})</div>
            </td>`;
        case "chgPct":
          return `
            <td>
              ${renderChangePctBlock(s)}
            </td>`;
        case "volume":
          return `
            <td class="col-volume">
              <div class="table-lv1">${fmt(s.volume)}</div>
              <div class="table-lv2">昨 ${fmt(s.prev_volume)}</div>
              <div class="table-lv2 ${trendClass(s.volume_ratio)}">${isNil(s.volume_ratio) ? "-" : `${fmtTrend(s.volume_ratio)}${fmt(s.volume_ratio, "%")}`}</div>
              <div class="table-lv3">${isNil(s.volume_add) ? "-" : `${fmt(s.volume_add)}張`}</div>
            </td>`;
        case "chip_concentration_score":
          return renderChipConcentrationCell(s);
        case "main_force_score":
          return renderMainForceCell(s);
        case "broker_diff":
          return renderBrokerDiffCell(s);
        case "eps_Y":
          return `
            <td>
              <div class="table-lv1">${fmt(s.eps_Y)}</div>
              <div class="table-lv2">${fmt(s.eps_ttm)}</div>
            </td>`;
        case "rev":
          return `<td>${renderMetric3(s.rev, s.rev_mom, s.rev_qoq, s.rev_yoy)}</td>`;
        case "gross_margin":
          return `<td>${renderMetric3(s.gross_margin, null, s.gross_margin_qoq, s.gross_margin_yoy_diff)}</td>`;
        case "operating_margin":
          return `<td>${renderMetric3(s.operating_margin, null, s.operating_margin_qoq, s.operating_margin_yoy_diff)}</td>`;
        case "net_margin":
          return `<td>${renderMetric3(s.net_margin, null, s.net_margin_qoq, s.net_margin_yoy_diff)}</td>`;
        case "yield_value":
          return `<td>${fmt(Number(s.yield_value ?? 0) * 0.65, "%")}</td>`;
        case "per_latest":
          return `<td>${renderRangeMetric(s.per_latest, s.per_60d_low, s.per_60d_high)}</td>`;
        case "pbr_latest":
          return `<td>${renderRangeMetric(s.pbr_latest, s.pbr_60d_low, s.pbr_60d_high)}</td>`;
        case "k": {
          if (currentTab === "technical") return renderKDCell(s);
          const score = kdDayScore(s);
          return `
            <td>
              <div class="table-lv1 ${trendClass(score)}">${fmtTrend(score)}</div>
              <div class="table-lv2">K ${fmt(s.k)}</div>
              <div class="table-lv2">D ${fmt(s.d)}</div>
            </td>`;
        }
        case "bb_pct":
          return `
            <td>
              <div class="table-lv1 ${trendClass(s.bb_score)}">${fmtTrend(s.bb_score)}</div>
              ${renderRangeMetric(s.bb_pct, s.bb_lower, s.bb_upper)}
            </td>`;
        case "bias6":
          return `<td>${renderRangeMetric(s.bias6, s.bias6_min, s.bias6_max, "%", distClass(s.bias6))}</td>`;
        case "bias18":
          return `<td>${renderRangeMetric(s.bias18, s.bias18_min, s.bias18_max, "%", distClass(s.bias18))}</td>`;
        case "bias50":
          return `<td>${renderRangeMetric(s.bias50, s.bias50_min, s.bias50_max, "%", distClass(s.bias50))}</td>`;

        case "industry_summary":
          return `<td class="text-summary-cell industry-summary-cell"><div class="summary-text">${escapeHtml(s.industry_summary || "-")}</div></td>`;
        case "news_summary":
          return `<td class="text-summary-cell news-summary-cell"><div class="summary-text">${escapeHtml(s.news_summary || "-")}</div></td>`;
        case "sig":
          return renderSignalCell(s);
        default:
          return `<td>${fmt(s[key])}</td>`;
      }
    }

    function renderHead() {
      const columns = TAB_CONFIG[currentTab].columns;
      document.getElementById("stockHead").innerHTML = `
        <tr>
          ${columns.map(col => `<th class="${col.cls ?? ""}" data-key="${col.key}"${col.tooltip ? ` data-tooltip="${escapeHtml(col.tooltip)}" tabindex="0"` : ""}>${col.label}</th>`).join("")}
        </tr>`;
      bindSorting();
      updateSortIndicators();
    }

    function renderRow(s) {
      const columns = TAB_CONFIG[currentTab].columns;
      return `<tr>${columns.map(col => renderCell(s, col.key)).join("")}</tr>`;
    }

    function renderMobileCard(s) {
      const dispositionHtml = dispositionPeriodHtml(s);
      const tab = currentTab;

      const commonHead = `
        <div class="stock-head">
          <div>
            <div class="table-lv1"><b>${shortName(s.name)} (${s.code ?? ""})</b></div>
            ${dispositionHtml ? `<div class="table-lv3 text-red disposition-period">${dispositionHtml}</div>` : ""}
            <div class="table-lv2 ${chgClass(s)}">${chgSign(s)}${fmt(s.chg)} / ${chgSign(s)}${fmt(s.chgPct, "%")}</div>
          </div>
          <div class="stock-value">${renderRangeMetric(s.price, s.price_60d_low, s.price_60d_high)}</div>
        </div>`;

      const technicalGrid = `
        <div class="stock-grid">
          <div class="stock-item"><div class="stock-label">漲跌% / 震幅% LH</div><div class="stock-value">${renderChangePctBlock(s)}</div></div>
          <div class="stock-item"><div class="stock-label">價格LH 3天趨勢</div>${renderPriceLHTrendBlock(s)}</div>
          <div class="stock-item"><div class="stock-label">日KD 3天趨勢</div>${renderKDBlock(s)}</div>
          <div class="stock-item"><div class="stock-label">日布林% LH</div><div class="stock-value"><div class="table-lv1 ${trendClass(s.bb_score)}">${fmtTrend(s.bb_score)}</div>${renderRangeMetric(s.bb_pct, s.bb_lower, s.bb_upper)}</div></div>
          <div class="stock-item"><div class="stock-label">日Bias6 LH</div><div class="stock-value">${renderRangeMetric(s.bias6, s.bias6_min, s.bias6_max, "%", distClass(s.bias6))}</div></div>
          <div class="stock-item"><div class="stock-label">日Bias18 LH</div><div class="stock-value">${renderRangeMetric(s.bias18, s.bias18_min, s.bias18_max, "%", distClass(s.bias18))}</div></div>
          <div class="stock-item"><div class="stock-label">日Bias50 LH</div><div class="stock-value">${renderRangeMetric(s.bias50, s.bias50_min, s.bias50_max, "%", distClass(s.bias50))}</div></div>
          <div class="stock-item"><div class="stock-label">量 / 昨 / 增 / 張</div><div class="stock-value"><div>${fmt(s.volume)} 張</div><div class="table-lv2">昨 ${fmt(s.prev_volume)}</div><div class="table-lv2 ${trendClass(s.volume_ratio)}">${isNil(s.volume_ratio) ? "-" : `${fmtTrend(s.volume_ratio)} ${fmt(s.volume_ratio, "%")}`}</div><div class="table-lv2">${isNil(s.volume_add) ? "-" : `${fmt(s.volume_add)} 張`}</div></div></div>
          <div class="stock-item"><div class="stock-label">壓力點 / 距離</div><div class="stock-value"><div class="table-lv1 text-red">${fmt(s.resistance_price)}</div><div class="table-lv2">${isNil(s.resistance_distance_pct) ? "-" : `+${fmt(s.resistance_distance_pct, "%")}`}</div></div></div>
          <div class="stock-item"><div class="stock-label">支撐點 / 距離</div><div class="stock-value"><div class="table-lv1 text-green">${fmt(s.support_price)}</div><div class="table-lv2">${isNil(s.support_distance_pct) ? "-" : `-${fmt(s.support_distance_pct, "%")}`}</div></div></div>
          <div class="stock-item"><div class="stock-label">籌碼集中% 3天趨勢</div>${renderChipConcentrationBlock(s)}</div>
          <div class="stock-item"><div class="stock-label">主力買賣超 3天趨勢</div>${renderMainForceBlock(s)}</div>
          <div class="stock-item"><div class="stock-label">買賣家數差 趨勢</div>${renderBrokerDiffBlock(s)}</div>
        </div>`;

      const fundamentalGrid = `
        <div class="stock-grid">
          <div class="stock-item"><div class="stock-label">漲跌% / 震幅% LH</div><div class="stock-value">${renderChangePctBlock(s)}</div></div>
          <div class="stock-item"><div class="stock-label">EPS / TTM</div><div class="stock-value"><div class="table-lv1">${fmt(s.eps_Y)}</div><div class="table-lv2">${fmt(s.eps_ttm)}</div></div></div>
          <div class="stock-item"><div class="stock-label">營收</div><div class="stock-value">${renderMetric3(s.rev, s.rev_mom, s.rev_qoq, s.rev_yoy)}</div></div>
          <div class="stock-item"><div class="stock-label">毛利率</div><div class="stock-value">${renderMetric3(s.gross_margin, null, s.gross_margin_qoq, s.gross_margin_yoy_diff)}</div></div>
          <div class="stock-item"><div class="stock-label">營益率</div><div class="stock-value">${renderMetric3(s.operating_margin, null, s.operating_margin_qoq, s.operating_margin_yoy_diff)}</div></div>
          <div class="stock-item"><div class="stock-label">淨利率</div><div class="stock-value">${renderMetric3(s.net_margin, null, s.net_margin_qoq, s.net_margin_yoy_diff)}</div></div>
          <div class="stock-item"><div class="stock-label">殖利率 估65%</div><div class="stock-value">${fmt(Number(s.yield_value ?? 0) * 0.65, "%")}</div></div>
          <div class="stock-item"><div class="stock-label">日PER 60天LH</div><div class="stock-value">${renderRangeMetric(s.per_latest, s.per_60d_low, s.per_60d_high)}</div></div>
          <div class="stock-item"><div class="stock-label">日PBR 60天LH</div><div class="stock-value">${renderRangeMetric(s.pbr_latest, s.pbr_60d_low, s.pbr_60d_high)}</div></div>
          <div class="stock-item summary-mobile-item"><div class="stock-label">產業</div><div class="stock-value">${escapeHtml(s.industry_summary || "-")}</div></div>
          <div class="stock-item summary-mobile-item"><div class="stock-label">新聞</div><div class="stock-value">${escapeHtml(s.news_summary || "-")}</div></div>
        </div>`;

      const overviewGrid = `
        <div class="stock-grid">
          <div class="stock-item"><div class="stock-label">EPS / TTM</div><div class="stock-value"><div class="table-lv1">${fmt(s.eps_Y)}</div><div class="table-lv2">${fmt(s.eps_ttm)}</div></div></div>
          <div class="stock-item"><div class="stock-label">日KD</div><div class="stock-value"><div class="table-lv1 ${trendClass(kdDayScore(s))}">${fmtTrend(kdDayScore(s))}</div><div class="table-lv2">K ${fmt(s.k)} / D ${fmt(s.d)}</div></div></div>
          <div class="stock-item"><div class="stock-label">日布林% LH</div><div class="stock-value"><div class="table-lv1 ${trendClass(s.bb_score)}">${fmtTrend(s.bb_score)}</div>${renderRangeMetric(s.bb_pct, s.bb_lower, s.bb_upper)}</div></div>
          <div class="stock-item"><div class="stock-label">量 / 昨 / 增 / 張</div><div class="stock-value"><div>${fmt(s.volume)} 張</div><div class="table-lv2">昨 ${fmt(s.prev_volume)}</div><div class="table-lv2 ${trendClass(s.volume_ratio)}">${isNil(s.volume_ratio) ? "-" : `${fmtTrend(s.volume_ratio)} ${fmt(s.volume_ratio, "%")}`}</div><div class="table-lv2">${isNil(s.volume_add) ? "-" : `${fmt(s.volume_add)} 張`}</div></div></div>
        </div>`;


      const signalBlock = `
        <div class="stock-signal">
          ${renderSignalText(s.signal_text)}
          ${s.entry_note ? `<div class="table-lv2">${escapeHtml(cleanSignalOutput(s.entry_note))}</div>` : ""}
        </div>`;

      let bodyGrid = overviewGrid;
      if (tab === "technical") bodyGrid = technicalGrid;
      if (tab === "fundamental") bodyGrid = fundamentalGrid;
      if (tab === "signal") bodyGrid = technicalGrid;

      return `
        <div class="stock-card">
          ${commonHead}
          ${bodyGrid}
          ${tab === "fundamental" ? "" : signalBlock}
        </div>`;
    }

    function renderTable(data) {
      document.getElementById("stockBody").innerHTML = data.map(renderRow).join("");
    }

    function renderMobileCards(data) {
      document.getElementById("mobileList").innerHTML = data.map(renderMobileCard).join("");
    }

    function getSortValue(s, key) {
      switch (key) {
        case "name":
          return s.name ?? "";
        case "code":
          return s.code ?? "";
        case "sig":
          return Number(s.sig ?? -999999);
        case "price_lh_trend": {
          const score = priceLHTrendScore(s);
          return isNil(score) ? -999999 : Number(score);
        }
        case "yield_value":
          return Number(((s.yield_value ?? 0) * 0.65).toFixed(4));
        case "per_latest":
        case "pbr_latest":
          return Number(s[key] ?? -999999);
        default: {
          const value = s[key];
          if (isNil(value) || value === "") return -999999;
          const num = Number(value);
          return Number.isNaN(num) ? String(value) : num;
        }
      }
    }

    function sortStocks(key) {
      if (currentSortKey === key) {
        currentSortDirection = currentSortDirection === "asc" ? "desc" : "asc";
      } else {
        currentSortKey = key;
        currentSortDirection = "asc";
      }
      sortCurrentRows();
      renderAll();
    }

    function sortCurrentRows() {
      if (!currentSortKey) return;
      sortedStocks.sort((a, b) => {
        const aVal = getSortValue(a, currentSortKey);
        const bVal = getSortValue(b, currentSortKey);
        const bothNumbers = typeof aVal === "number" && typeof bVal === "number";

        if (bothNumbers) {
          return currentSortDirection === "asc" ? aVal - bVal : bVal - aVal;
        }

        const result = String(aVal).localeCompare(String(bVal), "zh-Hant");
        return currentSortDirection === "asc" ? result : -result;
      });
    }

    function renderAll() {
      renderHead();
      renderTable(sortedStocks);
      renderMobileCards(sortedStocks);
      updateSortIndicators();
      const countEl = document.getElementById("filterCount");
      if (countEl) countEl.innerText = `顯示 ${sortedStocks.length} / ${baseStocks.length} 筆`;
    }

    function updateSortIndicators() {
      document.querySelectorAll("thead th").forEach((th) => {
        const key = th.dataset.key;
        if (!key) return;

        if (!th.dataset.label) {
          th.dataset.label = th.innerHTML.replace(/\s*[▲▼]$/, "");
        }

        th.innerHTML = key === currentSortKey
          ? `${th.dataset.label} ${currentSortDirection === "asc" ? "▲" : "▼"}`
          : th.dataset.label;
      });
    }

    function bindSorting() {
      document.querySelectorAll("thead th[data-key]").forEach((th) => {
        th.addEventListener("click", () => {
          sortStocks(th.dataset.key);
        });
      });
    }

    function bindTabs() {
      document.querySelectorAll(".tab-btn[data-tab]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const nextTab = btn.dataset.tab;
          if (!TAB_CONFIG[nextTab]) return;
          currentTab = nextTab;
          document.querySelectorAll(".tab-btn[data-tab]").forEach(b => b.classList.toggle("active", b.dataset.tab === currentTab));
          const note = document.getElementById("tabNote");
          if (note) note.innerText = TAB_CONFIG[currentTab].note;
          renderAll();
        });
      });
    }

    function getNumericValue(s, key) {
      if (key === "chip_concentration_pct_filter") {
        const value = pickFirst(s?.chip_concentration_pct_t0, s?.chip_concentration_pct);
        if (isNil(value) || value === "") return null;
        const num = Number(value);
        return Number.isNaN(num) ? null : num;
      }
      if (key === "main_force_net_filter") {
        const value = pickFirst(s?.main_force_net_t0, s?.main_force_net);
        if (isNil(value) || value === "") return null;
        const num = Number(value);
        return Number.isNaN(num) ? null : num;
      }
      if (key === "broker_diff_filter") {
        const value = pickFirst(s?.broker_diff_t0, s?.broker_diff);
        if (isNil(value) || value === "") return null;
        const num = Number(value);
        return Number.isNaN(num) ? null : num;
      }
      const value = s?.[key];
      if (isNil(value) || value === "") return null;
      const num = Number(value);
      return Number.isNaN(num) ? null : num;
    }

    function passesFilters(s) {
      const codeInput = document.getElementById("stockCodeFilter");
      const codeKeyword = String(codeInput?.value ?? "").trim();
      if (codeKeyword) {
        const stockCode = String(s?.code ?? s?.stock_id ?? "").trim();
        if (!stockCode.includes(codeKeyword)) return false;
      }

      const inputs = document.querySelectorAll("[data-filter-key]");
      for (const input of inputs) {
        const raw = String(input.value ?? "").trim();
        if (raw === "") continue;

        const key = input.dataset.filterKey;
        const target = Number(raw);
        const value = getNumericValue(s, key);
        const opEl = document.querySelector(`[data-filter-op="${key}"]`);
        const op = opEl ? opEl.value : ">";

        if (Number.isNaN(target) || value === null) return false;
        if (op === ">" && !(value > target)) return false;
        if (op === "<" && !(value < target)) return false;
      }
      return true;
    }

    function applyFilters() {
      sortedStocks = baseStocks.filter(passesFilters);
      sortCurrentRows();
      renderAll();
    }

    function clearFilters() {
      document.querySelectorAll("[data-filter-key]").forEach(input => input.value = "");
      document.querySelectorAll("[data-filter-op]").forEach(select => select.value = ">");
      const codeInput = document.getElementById("stockCodeFilter");
      if (codeInput) codeInput.value = "";
      applyFilters();
    }

    function bindFilters() {
      document.querySelectorAll("[data-filter-key]").forEach(input => {
        input.addEventListener("input", applyFilters);
        input.addEventListener("change", applyFilters);
      });
      document.querySelectorAll("[data-filter-op]").forEach(select => {
        select.addEventListener("change", applyFilters);
      });
      const codeInput = document.getElementById("stockCodeFilter");
      if (codeInput) {
        codeInput.addEventListener("input", applyFilters);
        codeInput.addEventListener("change", applyFilters);
      }
      const applyBtn = document.getElementById("applyFilterBtn");
      const clearBtn = document.getElementById("clearFilterBtn");
      if (applyBtn) applyBtn.addEventListener("click", applyFilters);
      if (clearBtn) clearBtn.addEventListener("click", clearFilters);
    }

    bindTabs();
    bindFilters();
    renderAll();
  </script>



</body>

</html>
