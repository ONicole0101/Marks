name: 產出Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: Report type/name
        required: false
        default: ""
      csv_file:
        description: Stock list file
        required: false
        default: ""
      output_file:
        description: HTML filename prefix
        required: false
        default: ""
  schedule:
    - cron: "0 8 * * 1-5"

permissions:
  contents: write

concurrency:
  group: report-${{ github.ref }}
  cancel-in-progress: false

env:
  REPORT_TYPE: ${{ github.event.inputs.report_type || vars.REPORT_TYPE || '持股' }}
  CSV_FILE: ${{ github.event.inputs.csv_file || vars.CSV_FILE || 'stocks.csv' }}
  REPORT_TITLE: ${{ vars.REPORT_TITLE || '(持股)技術分析報告' }}
  OUTPUT_FILE: ${{ github.event.inputs.output_file || vars.OUTPUT_FILE || '持股' }}
  REPORT_SUBTITLE: ${{ vars.REPORT_SUBTITLE || '' }}
  STATIC_OUTPUT_FILE: ${{ vars.STATIC_OUTPUT_FILE || 'AllStatic.csv' }}
  STATIC_CHIP_OUTPUT_FILE: ${{ vars.STATIC_CHIP_OUTPUT_FILE || 'AllStatic_Chip.csv' }}

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas requests jinja2 FinMind PyYAML loguru tqdm
          fi

      - name: Show runtime config
        run: |
          python - <<'PY'
          import config
          for name in ['REPORT_TYPE','CSV_FILE','REPORT_TITLE','OUTPUT_FILE','REPORT_SUBTITLE','STATIC_OUTPUT_FILE','STATIC_CHIP_OUTPUT_FILE']:
              print(f'{name}={getattr(config, name, None)}')
          PY

      - name: Verify static files exist
        run: |
          test -f "${STATIC_OUTPUT_FILE}" || (echo "${STATIC_OUTPUT_FILE} not found. Run update_static.yml first." && exit 1)
          test -f "${STATIC_CHIP_OUTPUT_FILE}" || (echo "${STATIC_CHIP_OUTPUT_FILE} not found. Run chips_analysis.yml or update_static.yml first." && exit 1)

      - name: Generate HTML
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          STATIC_CSV_FILE: ${{ env.STATIC_OUTPUT_FILE }}
          STATIC_CHIP_FILE: ${{ env.STATIC_CHIP_OUTPUT_FILE }}
          STATIC_CHIPS_FILE: ${{ env.STATIC_CHIP_OUTPUT_FILE }}
        run: python generate_html.py

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html config.py
          git diff --cached --quiet || git commit -m "Update ${REPORT_TYPE} report"

      - name: Push changes
        run: git push
