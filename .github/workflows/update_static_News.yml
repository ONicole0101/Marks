name: Update Static News CSV

on:
  schedule:
    # Taiwan 15:30 = UTC 07:30
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Update Static_news.csv
        env:
          STOCKS_CSV: ${{ vars.STOCKS_CSV || 'stocks.csv' }}
          ALLSTATIC_NEWS_OUTPUT_FILE: ${{ vars.ALLSTATIC_NEWS_OUTPUT_FILE || 'AllStatic_news.csv' }}
          NEWS_DAYS: ${{ vars.NEWS_DAYS || '10' }}
          NEWS_MAX_ITEMS: ${{ vars.NEWS_MAX_ITEMS || '12' }}
          NEWS_SLEEP_SEC: ${{ vars.NEWS_SLEEP_SEC || '0.6' }}
          # 預設保留既有「產業」欄，主要每天更新「新聞」。要重寫產業可設 repo variable REFRESH_INDUSTRY=1。
          REFRESH_INDUSTRY: ${{ vars.REFRESH_INDUSTRY || '0' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: |
          python generate_static_news_service.py

      - name: Commit Static_news.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AllStatic_news.csv
          git diff --cached --quiet || git commit -m "Update AllStatic_news.csv"
          git push
