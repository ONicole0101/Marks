name: Update Static CSV

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    # 20:00 UTC = Taiwan time 04:00.
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: update-static-csv
  cancel-in-progress: false

jobs:
  update-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest before update
        run: |
          git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests jinja2 FinMind PyYAML loguru tqdm

      - name: Prepare config for static build
        run: |
          cat > config.py <<'PY'
          REPORT_TYPE = "持股"
          CSV_FILE = "stocks.csv"
          REPORT_TITLE = "(持股)技術分析報告"
          OUTPUT_FILE = "持股"
          STATIC_OUTPUT_FILE = "AllStatic.csv"
          PY

      - name: Generate AllStatic.csv
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python generate_static_csv.py

      - name: Commit AllStatic.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AllStatic.csv config.py
          git diff --cached --quiet || git commit -m "Update AllStatic.csv"

      - name: Push changes
        run: |
          git pull --rebase
          git push
