name: 留意買Rpt

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1-5"    ## 台灣時間 週一至週五 16:00 (UTC 07:00)

permissions:
  contents: write

jobs:
  build-Holding-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests jinja2 FinMind PyYAML loguru tqdm

      - name: Prepare config for 留意買report
        run: |
          cat > config.py <<'PY'
          REPORT_TYPE = "留意買"
          CSV_FILE = "stocks.csv"
          REPORT_TITLE = "(留意買)技術分析報告"
          OUTPUT_FILE = "留意買"
          STATIC_OUTPUT_FILE = "AllStatic.csv"
          PY

      - name: Verify AllStatic.csv exists
        run: |
          test -f AllStatic.csv || (echo "AllStatic.csv not found. Run update_static.yml first." && exit 1)

      - name: Generate HTML
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          STATIC_CSV_FILE: AllStatic.csv
        run: |
          python generate_html.py

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html config.py
          git diff --cached --quiet || git commit -m "Update 留意買report"

      - name: Push changes
        run: |
          git push
