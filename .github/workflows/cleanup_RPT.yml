name: Cleanup Reports(RPT)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1-5"    ## 台灣時間 週一至週五 09:00 (UTC 01:00)

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ 刪除 HTML 報表（你原本的）
      - name: Delete old reports
        run: |
          ls -1t *股_*.html 2>/dev/null | tail -n +3 | xargs -r rm -f
      # ✅ Commit
      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "cleanup reports" || echo "no changes"
          git push
